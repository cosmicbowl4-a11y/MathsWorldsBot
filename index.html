<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MathsWorldsBot - Stages</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: white; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    canvas { display: block; }

    /* FLOATING REWARD (top-left) */
    #iq-reward {
      position: absolute;
      top: 50px;
      left: 30px;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff4d9a, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 4px 20px rgba(255, 77, 154, 0.4),
        0 0 30px rgba(0, 176, 255, 0.3);
      opacity: 0;
      transform: scale(0.6) translateY(30px);
      pointer-events: none;
      z-index: 100;
      user-select: none;
      transition: none;
    }

    /* RUNNING TOTAL IQ SCORE (top-right) */
    #total-iq {
      position: absolute;
      top: 50px;
      right: 30px;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff4d9a, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 4px 15px rgba(255, 77, 154, 0.35),
        0 0 25px rgba(0, 176, 255, 0.3);
      pointer-events: none;
      z-index: 100;
      user-select: none;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
  </style>
</head>
<body>
  <!-- FLOATING REWARD -->
  <div id="iq-reward">+10 IQ</div>
  
  <!-- RUNNING TOTAL IQ -->
  <div id="total-iq">0 IQ</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
  <script>
    // ====================== SCENE SETUP ======================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 4;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xffffff, 1);
    document.body.appendChild(renderer.domElement);

    // ====================== SHARED GRADIENT MATERIAL (WITH TRANSPARENCY) ======================
    const material = new THREE.ShaderMaterial({
      uniforms: { 
        mixValue: { value: 0.0 },
        opacity: { value: 1.0 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float mixValue;
        uniform float opacity;
        varying vec2 vUv;
        void main() {
          vec3 colorA = mix(vec3(0.6, 0.8, 1.0), vec3(0.0, 0.2, 0.6), vUv.y);
          vec3 colorB = mix(vec3(1.0, 0.0, 0.6), vec3(0.0, 0.3, 1.0), vUv.x);
          vec3 color = mix(colorA, colorB, mixValue);
          gl_FragColor = vec4(color, opacity);
        }
      `,
      side: THREE.DoubleSide,
      transparent: true
    });

    // ====================== STAGE 0: WAVY CIRCLE (START) ======================
    function createWavyCircle(radius, segments, waveAmplitude, waveFrequency) {
      const shape = new THREE.Shape();
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const r = radius + Math.sin(angle * waveFrequency) * waveAmplitude;
        const x = r * Math.cos(angle);
        const y = r * Math.sin(angle);
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }
      return new THREE.ShapeGeometry(shape);
    }

    const circleGeo = createWavyCircle(1, 256, 0.05, 15);
    const circle = new THREE.Mesh(circleGeo, material);
    scene.add(circle);

    // ====================== STAGE MANAGEMENT ======================
    let currentStage = 0;
    let currentMesh = circle;
    let totalIQ = 0;

    // Klein Bottle (Stage 5)
    function createKleinBottle() {
      const geometry = new THREE.BufferGeometry();
      const segments = 72;
      const positions = [];
      const uvs = [];

      for (let i = 0; i <= segments; i++) {
        for (let j = 0; j <= segments; j++) {
          const u = (i / segments) * Math.PI * 2;
          const v = (j / segments) * Math.PI * 2;

          const x = (2 + Math.cos(v / 2) * Math.sin(u) - Math.sin(v / 2) * Math.sin(2 * u)) * Math.cos(v);
          const y = (2 + Math.cos(v / 2) * Math.sin(u) - Math.sin(v / 2) * Math.sin(2 * u)) * Math.sin(v);
          const z = Math.sin(v / 2) * Math.sin(u) + Math.cos(v / 2) * Math.sin(2 * u);

          positions.push(x * 0.38, y * 0.38, z * 0.38);
          uvs.push(i / segments, j / segments);
        }
      }

      const indices = [];
      for (let i = 0; i < segments; i++) {
        for (let j = 0; j < segments; j++) {
          const a = i * (segments + 1) + j;
          const b = a + 1;
          const c = a + (segments + 1);
          const d = c + 1;
          indices.push(a, b, d);
          indices.push(a, d, c);
        }
      }

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    // Calabi-Yau (Stage 7)
    function createCalabiYau() {
      const geometry = new THREE.BufferGeometry();
      const segments = 64;
      const positions = [];
      const uvs = [];

      for (let i = 0; i <= segments; i++) {
        for (let j = 0; j <= segments; j++) {
          const u = (i / segments) * Math.PI * 2;
          const v = (j / segments) * Math.PI * 2;

          const x = Math.cos(u) * (2 + Math.sin(5 * v) * 0.4) * 0.22;
          const y = Math.sin(u) * (2 + Math.cos(5 * v) * 0.4) * 0.22;
          const z = (Math.sin(5 * u) * 0.8 + Math.cos(5 * v) * 0.3) * 0.22;

          positions.push(x, y, z);
          uvs.push(i / segments, j / segments);
        }
      }

      const indices = [];
      for (let i = 0; i < segments; i++) {
        for (let j = 0; j < segments; j++) {
          const a = i * (segments + 1) + j;
          const b = a + 1;
          const c = a + (segments + 1);
          const d = c + 1;
          indices.push(a, b, d);
          indices.push(a, d, c);
        }
      }

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    function createMeshForStage(stage) {
      if (stage === 1) {
        return new THREE.Mesh(new THREE.SphereGeometry(0.65, 64, 64), material);
      } 
      else if (stage === 2) {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 2.0, 64), material);
        mesh.rotation.x = Math.PI / 2;
        return mesh;
      }
      else if (stage === 3) {
        return new THREE.Mesh(new THREE.CircleGeometry(0.95, 128), material);
      }
      else if (stage === 4) {
        return new THREE.Mesh(new THREE.TorusGeometry(0.85, 0.22, 64, 128), material);
      }
      else if (stage === 5) {
        return createKleinBottle();
      }
      else if (stage === 6) {
        return new THREE.Mesh(new THREE.TorusKnotGeometry(0.78, 0.19, 220, 64, 3, 8), material);
      }
      else if (stage === 7) {
        return createCalabiYau();
      }
      else if (stage === 8) {
        return new THREE.Mesh(new THREE.SphereGeometry(0.92, 64, 64), material);
      }
      else if (stage === 9) {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 2.0, 64), material);
        mesh.rotation.x = Math.PI / 2;
        return mesh;
      }
      else if (stage === 10) {
        // STAGE 10: Transparent Circle (flat glowing disk — same as Stage 3 but transparent)
        return new THREE.Mesh(new THREE.CircleGeometry(0.95, 128), material);
      }
      return null;
    }

    // ====================== TAP DETECTION ======================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function handleTap(clientX, clientY) {
      mouse.x = (clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(currentMesh);

      if (intersects.length > 0) {
        advanceToNextStage();
      }
    }

    window.addEventListener('click', e => handleTap(e.clientX, e.clientY));
    window.addEventListener('touchstart', e => {
      if (e.touches.length > 0) handleTap(e.touches[0].clientX, e.touches[0].clientY);
    });

    // ====================== IQ REWARD (float up & fade) ======================
    function showIQReward(points) {
      const reward = document.getElementById('iq-reward');
      reward.textContent = `+${points} IQ`;

      reward.style.transition = 'none';
      reward.style.opacity = '0';
      reward.style.transform = 'scale(0.6) translateY(30px)';

      setTimeout(() => {
        reward.style.transition = 'all 0.65s cubic-bezier(0.34, 1.56, 0.64, 1)';
        reward.style.opacity = '1';
        reward.style.transform = 'scale(1) translateY(0)';
      }, 20);

      setTimeout(() => {
        reward.style.transition = 'all 1.1s cubic-bezier(0.25, 0.1, 0.25, 1)';
        reward.style.opacity = '0';
        reward.style.transform = 'scale(0.95) translateY(-180px)';
      }, 1050);

      setTimeout(() => {
        reward.style.transition = 'none';
        reward.style.opacity = '0';
        reward.style.transform = 'scale(0.6) translateY(30px)';
      }, 2200);
    }

    // ====================== UPDATE TOTAL IQ ======================
    function updateTotalIQ(points) {
      totalIQ += points;
      const totalEl = document.getElementById('total-iq');
      totalEl.textContent = `${totalIQ} IQ`;

      totalEl.style.transform = 'scale(1.35)';
      setTimeout(() => totalEl.style.transform = 'scale(1)', 1);
    }

    // ====================== ADVANCE STAGE ======================
    function advanceToNextStage() {
      if (currentStage >= 10) return;

      scene.remove(currentMesh);
      currentStage++;

      currentMesh = createMeshForStage(currentStage);
      scene.add(currentMesh);

      // Transparency for final 3 stages
      material.uniforms.opacity.value = (currentStage >= 8) ? 0.62 : 1.0;

      // Pop-in animation
      currentMesh.scale.set(0.05, 0.05, 0.05);
      let s = 0.05;
      const grow = setInterval(() => {
        s += 0.13;
        const scale = Math.min(1, s);
        currentMesh.scale.set(scale, scale, scale);
        if (scale >= 1) clearInterval(grow);
      }, 16);

      const points = currentStage * 10;
      showIQReward(points);
      updateTotalIQ(points);
    }

    // ====================== ANIMATION LOOP ======================
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);

      if (currentStage === 0) {
        currentMesh.rotation.z += 0.01;
      } else if (currentStage === 1) {
        currentMesh.rotation.y += 0.008;
      } else if (currentStage === 2) {
        currentMesh.rotation.z += 0.015;
      } else if (currentStage === 3) {
        currentMesh.rotation.z += 0.012;
      } else if (currentStage === 4) {
        currentMesh.rotation.x += 0.008;
        currentMesh.rotation.y += 0.015;
      } else if (currentStage === 5) {
        currentMesh.rotation.x += 0.006;
        currentMesh.rotation.y += 0.014;
      } else if (currentStage === 6) {
        currentMesh.rotation.x += 0.007;
        currentMesh.rotation.y += 0.019;
        currentMesh.rotation.z += 0.005;
      } else if (currentStage === 7) {
        currentMesh.rotation.x += 0.004;
        currentMesh.rotation.y += 0.012;
        currentMesh.rotation.z += 0.006;
      } else if (currentStage === 8) {
        currentMesh.rotation.y += 0.009;
        currentMesh.rotation.x += 0.005;
      } else if (currentStage === 9) {
        currentMesh.rotation.z += 0.018;
      } else if (currentStage === 10) {
        // Gentle spin for the final transparent circle
        currentMesh.rotation.z += 0.012;
      }

      t += 0.01;
      material.uniforms.mixValue.value = (Math.sin(t) + 1.0) / 2.0;

      renderer.render(scene, camera);
    }
    animate();

    // ====================== RESPONSIVE ======================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
