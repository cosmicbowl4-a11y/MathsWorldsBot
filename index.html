<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MathsWorlds Button</title>

<style>
body{
margin:0;
overflow:hidden;
background:white;
}
canvas{
display:block;
}
</style>

</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 7;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const group = new THREE.Group();
scene.add(group);

const planes = [];

const NUM_PLANES = 30;
const RADIUS = 2.4;

for(let i=0;i<NUM_PLANES;i++){

const angle = (i/NUM_PLANES)*Math.PI*2;

const geometry = new THREE.PlaneGeometry(
2.2,
0.55,
120,
20
);

const hue = i/NUM_PLANES;

const material = new THREE.MeshBasicMaterial({
color: new THREE.Color().setHSL(hue,0.7,0.55),
transparent:true,
opacity:0.85,
side:THREE.DoubleSide,
wireframe:false
});

const mesh = new THREE.Mesh(geometry,material);

mesh.position.x = Math.cos(angle)*RADIUS;
mesh.position.y = Math.sin(angle)*RADIUS;

mesh.lookAt(0,0,0);

group.add(mesh);

planes.push({
mesh:mesh,
geometry:geometry,
phase:i*0.25
});

}

const grid = new THREE.IcosahedronGeometry(1.15,1);
const wire = new THREE.WireframeGeometry(grid);

const metric = new THREE.LineSegments(
wire,
new THREE.LineBasicMaterial({
color:0x111111,
opacity:0.4,
transparent:true
})
);

group.add(metric);

const ghostPlanes=[];

for(let i=0;i<NUM_PLANES;i++){

const g=new THREE.PlaneGeometry(2.2,0.55,20,4);

const m=new THREE.MeshBasicMaterial({
color:0x000000,
transparent:true,
opacity:0.06,
side:THREE.DoubleSide
});

const mesh=new THREE.Mesh(g,m);

group.add(mesh);

ghostPlanes.push(mesh);

}

let t=0;

function animate(){

requestAnimationFrame(animate);

t+=0.02;

const amplitude =
0.25+
0.18*Math.sin(t);

planes.forEach((p,i)=>{

const pos=p.geometry.attributes.position;

for(let j=0;j<pos.count;j++){

const x=pos.getX(j);

const wave=
Math.sin(x*3 + t + p.phase);

pos.setZ(
j,
wave*amplitude
);

}

pos.needsUpdate=true;

ghostPlanes[i].position.copy(p.mesh.position);
ghostPlanes[i].rotation.copy(p.mesh.rotation);

});

group.rotation.z+=0.003;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
