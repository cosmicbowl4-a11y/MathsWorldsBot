<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MathsWorldsBot - Stage 1</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: white; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    canvas { display: block; }

    /* IQ REWARD LABEL - Top Left */
    #iq-reward {
      position: absolute;
      top: 50px;
      left: 30px;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff4d9a, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 4px 20px rgba(255, 77, 154, 0.4),
        0 0 30px rgba(0, 176, 255, 0.3);
      opacity: 0;
      transform: scale(0.6) translateY(-30px);
      transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 100;
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- IQ REWARD LABEL -->
  <div id="iq-reward">+10 IQ</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
  <script>
    // ====================== SCENE SETUP ======================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 4;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xffffff, 1);
    document.body.appendChild(renderer.domElement);

    // ====================== WAVY CIRCLE (START BUTTON) ======================
    function createWavyCircle(radius, segments, waveAmplitude, waveFrequency) {
      const shape = new THREE.Shape();
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const r = radius + Math.sin(angle * waveFrequency) * waveAmplitude;
        const x = r * Math.cos(angle);
        const y = r * Math.sin(angle);
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }
      return new THREE.ShapeGeometry(shape);
    }

    const geometry = createWavyCircle(1, 256, 0.05, 15);

    const material = new THREE.ShaderMaterial({
      uniforms: { mixValue: { value: 0.0 } },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float mixValue;
        varying vec2 vUv;
        void main() {
          vec3 colorA = mix(vec3(0.6, 0.8, 1.0), vec3(0.0, 0.2, 0.6), vUv.y);
          vec3 colorB = mix(vec3(1.0, 0.0, 0.6), vec3(0.0, 0.3, 1.0), vUv.x);
          vec3 color = mix(colorA, colorB, mixValue);
          gl_FragColor = vec4(color, 1.0);
        }
      `,
      side: THREE.DoubleSide
    });

    const circle = new THREE.Mesh(geometry, material);
    scene.add(circle);

    // ====================== SMALL SPHERE (NEXT STAGE) ======================
    let currentMesh = circle;
    let isCircle = true;
    let gameStarted = false;

    function createSphere() {
      const sphereGeometry = new THREE.SphereGeometry(0.65, 64, 64);
      const sphere = new THREE.Mesh(sphereGeometry, material); // same shader = identical colors
      scene.add(sphere);
      return sphere;
    }

    // ====================== CLICK / TAP ======================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function handleInteraction(clientX, clientY) {
      if (gameStarted) return;

      mouse.x = (clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(currentMesh);

      if (intersects.length > 0) {
        gameStarted = true;
        transitionToNextStage();
      }
    }

    window.addEventListener('click', e => handleInteraction(e.clientX, e.clientY));
    window.addEventListener('touchstart', e => {
      if (e.touches.length > 0) handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
    });

    // ====================== TRANSITION + IQ REWARD ======================
    function transitionToNextStage() {
      scene.remove(circle);

      const sphere = createSphere();
      currentMesh = sphere;
      isCircle = false;

      // Pop-in animation for the sphere
      sphere.scale.set(0.1, 0.1, 0.1);
      let s = 0.1;
      const grow = setInterval(() => {
        s += 0.12;
        sphere.scale.set(s, s, s);
        if (s >= 1) clearInterval(grow);
      }, 16);

      // SHOW +10 IQ LABEL (same pink→blue gradient as the sphere)
      const reward = document.getElementById('iq-reward');
      reward.style.transition = 'none';
      reward.style.opacity = '0';
      reward.style.transform = 'scale(0.6) translateY(-30px)';
      
      // Trigger pop-in
      setTimeout(() => {
        reward.style.transition = 'all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)';
        reward.style.opacity = '1';
        reward.style.transform = 'scale(1) translateY(0)';
      }, 100);
    }

    // ====================== ANIMATION LOOP ======================
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);

      if (isCircle) {
        currentMesh.rotation.z += 0.01;
      } else {
        currentMesh.rotation.y += 0.008;
      }

      t += 0.01;
      material.uniforms.mixValue.value = (Math.sin(t) + 1.0) / 2.0;

      renderer.render(scene, camera);
    }
    animate();

    // ====================== RESPONSIVE ======================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
