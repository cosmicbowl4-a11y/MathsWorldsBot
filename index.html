<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MathsWorldsBot - Start Screen</title>
  <style>
    body { margin: 0; overflow: hidden; background: white; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
  <script>
    // ====================== SCENE SETUP ======================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 4;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xffffff, 1);
    document.body.appendChild(renderer.domElement);

    // ====================== WAVY CIRCLE (START BUTTON) ======================
    function createWavyCircle(radius, segments, waveAmplitude, waveFrequency) {
      const shape = new THREE.Shape();
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const r = radius + Math.sin(angle * waveFrequency) * waveAmplitude;
        const x = r * Math.cos(angle);
        const y = r * Math.sin(angle);
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }
      return new THREE.ShapeGeometry(shape);
    }

    const geometry = createWavyCircle(1, 256, 0.05, 15);

    // Shader material (same gradient as your original)
    const material = new THREE.ShaderMaterial({
      uniforms: {
        mixValue: { value: 0.0 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float mixValue;
        varying vec2 vUv;
        void main() {
          vec3 colorA = mix(vec3(0.6, 0.8, 1.0), vec3(0.0, 0.2, 0.6), vUv.y);
          vec3 colorB = mix(vec3(1.0, 0.0, 0.6), vec3(0.0, 0.3, 1.0), vUv.x);
          vec3 color = mix(colorA, colorB, mixValue);
          gl_FragColor = vec4(color, 1.0);
        }
      `,
      side: THREE.DoubleSide
    });

    const circle = new THREE.Mesh(geometry, material);
    scene.add(circle);

    // ====================== NEXT STAGE: SMALL SPHERE ======================
    let currentMesh = circle;
    let isCircle = true;
    let gameStarted = false;

    function createSphere() {
      const sphereGeometry = new THREE.SphereGeometry(0.65, 64, 64); // small sphere
      const sphere = new THREE.Mesh(sphereGeometry, material); // same shader = exact same colors!
      scene.add(sphere);
      return sphere;
    }

    // ====================== CLICK / TAP DETECTION ======================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function handleInteraction(clientX, clientY) {
      if (gameStarted) return;

      mouse.x = (clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(currentMesh);

      if (intersects.length > 0) {
        gameStarted = true;
        transitionToNextStage();
      }
    }

    // Mouse click (for testing on desktop)
    window.addEventListener('click', (event) => {
      handleInteraction(event.clientX, event.clientY);
    });

    // Touch support (Telegram Mini App is mobile-first)
    window.addEventListener('touchstart', (event) => {
      if (event.touches.length > 0) {
        const touch = event.touches[0];
        handleInteraction(touch.clientX, touch.clientY);
      }
    });

    function transitionToNextStage() {
      // Remove the wavy start button
      scene.remove(circle);

      // Create and add the small sphere (same gradient colors)
      const sphere = createSphere();
      currentMesh = sphere;
      isCircle = false;

      // Optional: make the sphere "pop" in with a quick scale animation
      sphere.scale.set(0.1, 0.1, 0.1);
      let scaleProgress = 0;
      const scaleInterval = setInterval(() => {
        scaleProgress += 0.15;
        const s = Math.min(1, scaleProgress);
        sphere.scale.set(s, s, s);
        if (s >= 1) clearInterval(scaleInterval);
      }, 16);
    }

    // ====================== ANIMATION LOOP ======================
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);

      // Rotate the current object (different axis for circle vs sphere)
      if (isCircle) {
        currentMesh.rotation.z += 0.01;
      } else {
        currentMesh.rotation.y += 0.008;
      }

      // Animate gradient (same breathing effect)
      t += 0.01;
      material.uniforms.mixValue.value = (Math.sin(t) + 1.0) / 2.0;

      renderer.render(scene, camera);
    }
    animate();

    // ====================== RESPONSIVE ======================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</htmld>
