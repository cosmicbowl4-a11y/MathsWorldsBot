<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MathsWorldsBot - Stages</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: white; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    canvas { display: block; }

    /* FLOATING REWARD (top-left) */
    #iq-reward {
      position: absolute;
      top: 50px;
      left: 30px;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff4d9a, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 4px 20px rgba(255, 77, 154, 0.4),
        0 0 30px rgba(0, 176, 255, 0.3);
      opacity: 0;
      transform: scale(0.6) translateY(30px);
      pointer-events: none;
      z-index: 100;
      user-select: none;
      transition: none;
    }

    /* RUNNING TOTAL IQ SCORE (top-right) */
    #total-iq {
      position: absolute;
      top: 50px;
      right: 30px;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff4d9a, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 4px 15px rgba(255, 77, 154, 0.35),
        0 0 25px rgba(0, 176, 255, 0.3);
      pointer-events: none;
      z-index: 100;
      user-select: none;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
  </style>
</head>
<body>
  <!-- FLOATING REWARD -->
  <div id="iq-reward">+10 IQ</div>
  
  <!-- RUNNING TOTAL IQ -->
  <div id="total-iq">0 IQ</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
  <script>
    // ====================== SCENE SETUP ======================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 4;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xffffff, 1);
    document.body.appendChild(renderer.domElement);

    // ====================== SHARED GRADIENT MATERIAL ======================
    const material = new THREE.ShaderMaterial({
      uniforms: { mixValue: { value: 0.0 } },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float mixValue;
        varying vec2 vUv;
        void main() {
          vec3 colorA = mix(vec3(0.6, 0.8, 1.0), vec3(0.0, 0.2, 0.6), vUv.y);
          vec3 colorB = mix(vec3(1.0, 0.0, 0.6), vec3(0.0, 0.3, 1.0), vUv.x);
          vec3 color = mix(colorA, colorB, mixValue);
          gl_FragColor = vec4(color, 1.0);
        }
      `,
      side: THREE.DoubleSide
    });

    // ====================== STAGE 0: WAVY CIRCLE (START) ======================
    function createWavyCircle(radius, segments, waveAmplitude, waveFrequency) {
      const shape = new THREE.Shape();
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const r = radius + Math.sin(angle * waveFrequency) * waveAmplitude;
        const x = r * Math.cos(angle);
        const y = r * Math.sin(angle);
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }
      return new THREE.ShapeGeometry(shape);
    }

    const circleGeo = createWavyCircle(1, 256, 0.05, 15);
    const circle = new THREE.Mesh(circleGeo, material);
    scene.add(circle);

    // ====================== STAGE MANAGEMENT ======================
    let currentStage = 0;
    let currentMesh = circle;
    let totalIQ = 0;

    function createMeshForStage(stage) {
      if (stage === 1) {
        // Sphere
        const geo = new THREE.SphereGeometry(0.65, 64, 64);
        return new THREE.Mesh(geo, material);
      } 
      else if (stage === 2) {
        // Cylinder line (horizontal)
        const geo = new THREE.CylinderGeometry(0.15, 0.15, 2.0, 64);
        const mesh = new THREE.Mesh(geo, material);
        mesh.rotation.x = Math.PI / 2;
        return mesh;
      }
      else if (stage === 3) {
        // Clean Circle (flat glowing disk)
        const geo = new THREE.CircleGeometry(0.95, 128);
        return new THREE.Mesh(geo, material);
      }
      else if (stage === 4) {
        // NEW STAGE 4: Torus (glowing ring)
        const geo = new THREE.TorusGeometry(0.85, 0.22, 64, 128);
        return new THREE.Mesh(geo, material);
      }
      return null;
    }

    // ====================== TAP DETECTION ======================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function handleTap(clientX, clientY) {
      mouse.x = (clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(currentMesh);

      if (intersects.length > 0) {
        advanceToNextStage();
      }
    }

    window.addEventListener('click', e => handleTap(e.clientX, e.clientY));
    window.addEventListener('touchstart', e => {
      if (e.touches.length > 0) handleTap(e.touches[0].clientX, e.touches[0].clientY);
    });

    // ====================== IQ REWARD (float up & fade) ======================
    function showIQReward(points) {
      const reward = document.getElementById('iq-reward');
      reward.textContent = `+${points} IQ`;

      reward.style.transition = 'none';
      reward.style.opacity = '0';
      reward.style.transform = 'scale(0.6) translateY(30px)';

      setTimeout(() => {
        reward.style.transition = 'all 0.65s cubic-bezier(0.34, 1.56, 0.64, 1)';
        reward.style.opacity = '1';
        reward.style.transform = 'scale(1) translateY(0)';
      }, 20);

      setTimeout(() => {
        reward.style.transition = 'all 1.1s cubic-bezier(0.25, 0.1, 0.25, 1)';
        reward.style.opacity = '0';
        reward.style.transform = 'scale(0.95) translateY(-180px)';
      }, 1050);

      setTimeout(() => {
        reward.style.transition = 'none';
        reward.style.opacity = '0';
        reward.style.transform = 'scale(0.6) translateY(30px)';
      }, 2200);
    }

    // ====================== UPDATE TOTAL IQ ======================
    function updateTotalIQ(points) {
      totalIQ += points;
      const totalEl = document.getElementById('total-iq');
      totalEl.textContent = `${totalIQ} IQ`;

      totalEl.style.transform = 'scale(1.35)';
      setTimeout(() => totalEl.style.transform = 'scale(1)', 1);
    }

    // ====================== ADVANCE STAGE ======================
    function advanceToNextStage() {
      if (currentStage >= 4) return;   // ← Now allows up to Stage 4

      scene.remove(currentMesh);
      currentStage++;

      currentMesh = createMeshForStage(currentStage);
      scene.add(currentMesh);

      // Pop-in animation
      currentMesh.scale.set(0.05, 0.05, 0.05);
      let s = 0.05;
      const grow = setInterval(() => {
        s += 0.13;
        const scale = Math.min(1, s);
        currentMesh.scale.set(scale, scale, scale);
        if (scale >= 1) clearInterval(grow);
      }, 16);

      // Reward
      const points = currentStage * 10;
      showIQReward(points);
      updateTotalIQ(points);
    }

    // ====================== ANIMATION LOOP ======================
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);

      // Different rotation per stage
      if (currentStage === 0) {
        currentMesh.rotation.z += 0.01;
      } else if (currentStage === 1) {
        currentMesh.rotation.y += 0.008;
      } else if (currentStage === 2) {
        currentMesh.rotation.z += 0.015;
      } else if (currentStage === 3) {
        currentMesh.rotation.z += 0.012;
      } else if (currentStage === 4) {
        currentMesh.rotation.x += 0.008;   // beautiful spinning torus
        currentMesh.rotation.y += 0.015;
      }

      // Breathing gradient
      t += 0.01;
      material.uniforms.mixValue.value = (Math.sin(t) + 1.0) / 2.0;

      renderer.render(scene, camera);
    }
    animate();

    // ====================== RESPONSIVE ======================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
