<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dimensional Morphs</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: white;
      font-family: sans-serif;
    }
    canvas {
      display: block;
    }
    #startBtn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 40px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(90deg, #66ccff, #9933ff);
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(153, 51, 255, 0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    #startBtn:hover {
      transform: translateX(-50%) scale(1.1);
      box-shadow: 0 0 25px rgba(153, 51, 255, 0.9);
    }
  </style>
</head>
<body>
  <!-- Curvy gradient start button -->
  <button id="startBtn">▶</button>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
  <!-- Main logic -->
  <script src="main.js"></script>
</body>
</html>
